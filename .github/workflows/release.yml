name: Build & Release

# Triggers:
#  - Push a tag like "v1.0.0"  →  automatic release
#  - Actions tab → Run workflow  →  manual release with a version you type
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for this release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # 1. Source
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Build tools 
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # 3. Restore NuGet packages
      - name: Restore NuGet packages
        run: nuget restore packages.config -PackagesDirectory packages -SolutionDirectory .

      # 4. Build (unpackaged – no signing needed)
      - name: Build Release x64
        shell: pwsh
        run: |
          msbuild froggy.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m

      # 5. Stage release folder
      - name: Stage release files
        id: stage
        shell: pwsh
        run: |
          $outDir = "x64\Release"
          $stage  = "$env:GITHUB_WORKSPACE\release-bundle"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # Copy the exe and all required DLLs / resources
          Copy-Item "$outDir\froggy.exe"   -Destination $stage
          Copy-Item "$outDir\*.dll"          -Destination $stage -ErrorAction SilentlyContinue
          Copy-Item "$outDir\*.pri"          -Destination $stage -ErrorAction SilentlyContinue
          Copy-Item "$outDir\resources.pri"  -Destination $stage -ErrorAction SilentlyContinue
          if (Test-Path "$outDir\Assets") {
            Copy-Item "$outDir\Assets" -Destination "$stage\Assets" -Recurse
          }
          # Copy WinUI XAML resources (Microsoft.UI.Xaml directory)
          Get-ChildItem "$outDir" -Directory -Filter "Microsoft.UI.Xaml" | ForEach-Object {
            Copy-Item $_.FullName -Destination "$stage\$($_.Name)" -Recurse
          }

          echo "STAGE_DIR=$stage" >> $env:GITHUB_ENV

      # 6. Upload artifact
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: froggy-x64
          path: ${{ env.STAGE_DIR }}
